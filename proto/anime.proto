syntax = "proto3";
package anime;

service AnimeService {
  rpc GetAnimeList (Empty) returns (AnimeListResponse);
  rpc GetAnimeStreams (StreamRequest) returns (StreamResponse);
}

message Empty {}

message Anime {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string cover_image = 4;
}

message AnimeListResponse {
  repeated Anime animes = 1;
}

message StreamRequest {
  int32 anime_id = 1;
}

message StreamResponse {
  string stream_url = 1;
  string title = 2;
  string cover_image = 3;
}
