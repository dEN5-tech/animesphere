name: CI Build (macOS & Linux)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    name: Build Linux Client
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libmpv-dev protobuf-compiler

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Build frontend
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build dependencies
      uses: swatinem/rust-cache@v2

    - name: Build Rust application
      run: |
        export PROTOC=/usr/bin/protoc
        cargo build --release

    - name: Package Linux Release Archive
      run: |
        mkdir -p dist_linux
        cp target/release/animesphere dist_linux/
        cp -r shaders dist_linux/
        cd dist_linux
        zip -r ../animesphere-linux-x86_64.zip *

    - name: Upload Linux Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: animesphere-linux
        path: animesphere-linux-x86_64.zip

  build-macos:
    name: Build macOS Client
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install macOS dependencies
      run: |
        brew update
        brew install mpv protobuf

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Build frontend
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build dependencies
      uses: swatinem/rust-cache@v2

    - name: Build Rust application
      run: |
        HOMEBREW_PREFIX="$(brew --prefix)"
        MPV_PREFIX="$(brew --prefix mpv)"
        export LIBRARY_PATH="$MPV_PREFIX/lib:$HOMEBREW_PREFIX/lib:${LIBRARY_PATH:-}"
        export DYLD_FALLBACK_LIBRARY_PATH="$MPV_PREFIX/lib:$HOMEBREW_PREFIX/lib:${DYLD_FALLBACK_LIBRARY_PATH:-}"
        export PKG_CONFIG_PATH="$MPV_PREFIX/lib/pkgconfig:$HOMEBREW_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
        cargo build --release

    - name: Package macOS Release Archive
      run: |
        mkdir -p dist_macos
        cp target/release/animesphere dist_macos/
        cp -r shaders dist_macos/
        cd dist_macos
        zip -r ../animesphere-macos-arm64.zip *

    - name: Upload macOS Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: animesphere-macos
        path: animesphere-macos-arm64.zip

  publish:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: animesphere-linux
        path: ./artifacts

    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: animesphere-macos
        path: ./artifacts

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/animesphere-linux-x86_64.zip
          ./artifacts/animesphere-macos-arm64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
