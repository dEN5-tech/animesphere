name: CI Build (macOS & Linux)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    name: Build Linux Client
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libmpv-dev protobuf-compiler

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Build frontend
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build dependencies
      uses: swatinem/rust-cache@v2

    - name: Build Rust application
      run: |
        export PROTOC=/usr/bin/protoc
        cargo build --release

    - name: Upload Linux Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: animesphere-linux
        path: target/release/animesphere

  build-macos:
    name: Build macOS Client
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install macOS dependencies
      run: |
        brew update
        brew install mpv protobuf

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Build frontend
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build dependencies
      uses: swatinem/rust-cache@v2

    - name: Build Rust application
      run: |
        cargo build --release

    - name: Upload macOS Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: animesphere-macos
        path: target/release/animesphere
